<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇸🇮 Slovenia Lead Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
:root {
  --bg: #0d1117; --card: #161b22; --card2: #1c2128;
  --border: #30363d; --text: #e6edf3; --muted: #7d8590;
  --accent: #6366f1; --red: #ef4444; --amber: #f59e0b;
  --green: #22c55e;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
input, select { font-family: inherit; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>
<script>
const DATA       = %%DATA%%;
const ISSUE_META = %%ISSUE_META%%;
const PITCHES    = %%PITCHES%%;
const PW_HASH    = '%%PW_HASH%%';
</script>
<script type="text/babel">
const { useState, useCallback } = React;

const bizKey = (b) =>
  ('sl_' + (b.name||'') + '_' + (b.phone||'')).replace(/\s+/g,'_').slice(0,90);
function loadCS(b) {
  try { return JSON.parse(localStorage.getItem(bizKey(b))) || {}; } catch { return {}; }
}
function saveCS(b, s) {
  try { localStorage.setItem(bizKey(b), JSON.stringify(s)); } catch {}
}

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

function LoginScreen({ onLogin }) {
  const [pw, setPw] = useState('');
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);
  async function tryLogin() {
    if (!pw) return;
    setLoading(true);
    const hash = await sha256(pw);
    if (hash === PW_HASH) {
      sessionStorage.setItem('sl_auth','1');
      onLogin();
    } else {
      setErr('Wrong password'); setPw('');
      setTimeout(() => setErr(''), 3000);
    }
    setLoading(false);
  }
  return (
    <div style={{position:'fixed',inset:0,zIndex:9999,background:'linear-gradient(135deg,#0f0c29,#1a1040,#1e1b4b)',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:18,padding:'44px 52px',width:360,textAlign:'center',boxShadow:'0 32px 80px rgba(0,0,0,.7)'}}>
        <div style={{fontSize:'3rem',marginBottom:10}}>🇸🇮</div>
        <h2 style={{fontSize:'1.35rem',fontWeight:700,marginBottom:6}}>Leads Dashboard</h2>
        <p style={{color:'var(--muted)',fontSize:'.82rem',marginBottom:32}}>Slovenia Website Audit Tool</p>
        <input type="password" value={pw} autoFocus
          onChange={e=>setPw(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&tryLogin()}
          placeholder="Password"
          style={{width:'100%',padding:'13px 16px',borderRadius:10,border:'1px solid var(--border)',background:'var(--bg)',color:'var(--text)',fontSize:'.95rem',outline:'none',marginBottom:8}}
        />
        <div style={{color:'var(--red)',fontSize:'.8rem',minHeight:20,marginBottom:8}}>{err}</div>
        <button onClick={tryLogin} disabled={loading}
          style={{width:'100%',padding:'13px 0',borderRadius:10,border:'none',background:'linear-gradient(135deg,#6366f1,#4f46e5)',color:'white',fontSize:'.95rem',fontWeight:700,cursor:loading?'not-allowed':'pointer',opacity:loading?.7:1}}>
          {loading ? 'Checking…' : 'Sign In →'}
        </button>
      </div>
    </div>
  );
}

function sev(issues) {
  if (!issues?.length) return 'clean';
  const scores = issues.map(i => ISSUE_META[i]?.sev || 1);
  const max = Math.max(...scores), total = scores.reduce((a,b)=>a+b,0);
  return (max>=4||total>=8)?'high':(max>=3||total>=4)?'med':'low';
}
const SEV_C = {high:'#ef4444',med:'#f59e0b',low:'#22c55e',clean:'#22c55e'};

function CallTracker({ biz, onUpdate }) {
  const [cs, setCs] = useState(() => loadCS(biz));
  function toggle(field) {
    const next = {...cs};
    if (field==='called' && cs.called) { delete next.called; delete next.answered; delete next.interested; }
    else if (field==='answered' && cs.answered) { delete next.answered; delete next.interested; }
    else { next[field] = !next[field]; }
    setCs(next); saveCS(biz, next); onUpdate?.();
  }
  const btn = (label, field, color, show=true) => !show ? null : (
    <button key={field} onClick={()=>toggle(field)} style={{
      padding:'4px 11px',borderRadius:20,fontSize:'.7rem',fontWeight:700,
      border:`1px solid ${cs[field]?color:'var(--border)'}`,
      background:cs[field]?color+'22':'transparent',
      color:cs[field]?color:'var(--muted)',cursor:'pointer',transition:'all .15s',
    }}>{label}</button>
  );
  return (
    <div style={{marginTop:12,paddingTop:10,borderTop:'1px solid var(--border)',display:'flex',gap:6,flexWrap:'wrap',alignItems:'center'}}>
      <span style={{color:'var(--muted)',fontSize:'.68rem'}}>CRM:</span>
      {btn(cs.called?'📞 Called':'📞 Call','called','#6366f1')}
      {cs.called && btn(cs.answered?'✅ Answered':'✅ Answer?','answered','#22c55e')}
      {cs.answered && btn(cs.interested?'⭐ Interested':'⭐ Interested?','interested','#f59e0b')}
    </div>
  );
}

function BusinessCard({ biz, onUpdate }) {
  const [pitchOpen, setPitchOpen] = useState(false);
  const issues = biz.audit?.issues || [];
  const severity = sev(issues);
  const color = SEV_C[severity];
  const cs = loadCS(biz);
  return (
    <div style={{
      background:'var(--card)',border:'1px solid var(--border)',
      borderLeft:`4px solid ${color}`,borderRadius:12,padding:'18px 20px',
      display:'flex',flexDirection:'column',gap:10,
      opacity:(cs.called&&!cs.interested&&!cs.answered)?.72:1,transition:'opacity .2s',
    }}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8}}>
        <div style={{fontWeight:700,fontSize:'.97rem',lineHeight:1.3,flex:1}}>{biz.name||'—'}</div>
        <div style={{
          background:color+'1a',border:`1px solid ${color}55`,color,
          borderRadius:20,padding:'2px 10px',fontSize:'.68rem',fontWeight:800,whiteSpace:'nowrap',flexShrink:0,
        }}>
          {severity==='clean'?'✅ OK':`${issues.length} issue${issues.length!==1?'s':''}`}
        </div>
      </div>
      <div style={{fontSize:'.79rem',color:'var(--muted)',lineHeight:1.7}}>
        {biz.website
          ? <a href={biz.website} target="_blank" rel="noreferrer" style={{color:'var(--accent)',textDecoration:'none',wordBreak:'break-all'}}>
              {biz.website.replace(/^https?:\/\//,'').slice(0,55)}
            </a>
          : <span style={{color:'#4a5568',fontStyle:'italic'}}>no website URL</span>
        }
        {biz.phone && <> · <span style={{color:'var(--text)'}}>{biz.phone}</span></>}
        {biz.email && <><br/><span>{biz.email}</span></>}
        {biz.address && <><br/>{biz.address}</>}
        {biz.category && <><br/><em style={{color:'#8b949e'}}>{biz.category}</em></>}
        {biz.source && <> · <span style={{background:'#1e1b4b',border:'1px solid #312e81',color:'#a5b4fc',borderRadius:4,padding:'1px 6px',fontSize:'.66rem'}}>{biz.source}</span></>}
        {biz.audit?.audit_note && <> · <span style={{fontSize:'.66rem',color:'#6b7280'}}>{biz.audit.audit_note}</span></>}
      </div>
      {issues.length>0 && (
        <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
          {issues.map(id => {
            const m = ISSUE_META[id]||{label:id,color:'#888'};
            return <span key={id} style={{fontSize:'.68rem',padding:'3px 9px',borderRadius:20,fontWeight:700,border:`1px solid ${m.color}44`,color:m.color,background:m.color+'10'}}>{m.label}</span>;
          })}
        </div>
      )}
      {issues.length===0 && biz.audit && <span style={{color:'var(--green)',fontSize:'.8rem'}}>✅ No issues detected</span>}
      {issues.length>0 && (
        <>
          <button onClick={()=>setPitchOpen(o=>!o)}
            style={{background:'none',border:'none',color:'var(--accent)',fontSize:'.72rem',cursor:'pointer',textAlign:'left',padding:0,fontWeight:600}}>
            💬 Sales pitch {pitchOpen?'▲':'▼'}
          </button>
          {pitchOpen && (
            <div style={{background:'var(--bg)',borderRadius:8,padding:'10px 14px',fontSize:'.77rem',color:'#9ca3af',lineHeight:1.6,border:'1px solid var(--border)'}}>
              {issues.filter(id=>PITCHES[id]).slice(0,4).map(id=>(
                <div key={id} style={{marginBottom:4}}>
                  <strong style={{color:ISSUE_META[id]?.color||'var(--muted)'}}>{ISSUE_META[id]?.label||id}:</strong>{' '}{PITCHES[id]}
                </div>
              ))}
            </div>
          )}
        </>
      )}
      <CallTracker biz={biz} onUpdate={onUpdate} />
    </div>
  );
}

function Stat({ label, value, color }) {
  return (
    <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:10,padding:'10px 18px',minWidth:80,textAlign:'center'}}>
      <div style={{fontWeight:800,fontSize:'1.25rem',color:color||'var(--accent)'}}>{value}</div>
      <div style={{fontSize:'.7rem',color:'var(--muted)',marginTop:1}}>{label}</div>
    </div>
  );
}

function App() {
  const [authed, setAuthed] = useState(sessionStorage.getItem('sl_auth')==='1');
  const [search, setSearch] = useState('');
  const [issueF, setIssueF] = useState('');
  const [sourceF, setSourceF] = useState('');
  const [callF, setCallF] = useState('');
  const [sortBy, setSortBy] = useState('score');
  const [tick, setTick] = useState(0);
  const refresh = useCallback(() => setTick(n=>n+1), []);

  if (!authed) return <LoginScreen onLogin={()=>setAuthed(true)} />;

  let items = DATA.filter(b => {
    const issues = b.audit?.issues || [];
    if (issueF && !issues.includes(issueF)) return false;
    if (sourceF && b.source !== sourceF) return false;
    if (search) {
      const q = search.toLowerCase();
      const hay = [b.name,b.phone,b.email,b.address,b.website,b.category,b.source].filter(Boolean).join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    if (callF) {
      const cs = loadCS(b);
      if (callF==='uncalled'&&cs.called) return false;
      if (callF==='called'&&!cs.called) return false;
      if (callF==='answered'&&!cs.answered) return false;
      if (callF==='interested'&&!cs.interested) return false;
    }
    return true;
  });

  if (sortBy==='score') items.sort((a,b)=>(b.audit?.issues||[]).length-(a.audit?.issues||[]).length);
  else items.sort((a,b)=>(a.name||'').localeCompare(b.name||'','sl'));

  const total      = DATA.length;
  const audited    = DATA.filter(b=>b.audit).length;
  const hasIssues  = DATA.filter(b=>(b.audit?.issues||[]).length>0).length;
  const called     = DATA.filter(b=>loadCS(b).called).length;
  const answered   = DATA.filter(b=>loadCS(b).answered).length;
  const interested = DATA.filter(b=>loadCS(b).interested).length;
  const sources    = [...new Set(DATA.map(b=>b.source).filter(Boolean))].sort();
  const issueTypes = Object.keys(ISSUE_META);

  function exportCSV() {
    const hdrs = ['Ime','Telefon','Email','Naslov','Vir','Spletna stran','Težave','Poklical','Odgovoril','Zainteresiran'];
    const rows = DATA.map(b => {
      const iss = (b.audit?.issues||[]).map(id=>(ISSUE_META[id]||{}).label||id).join(' | ');
      const cs = loadCS(b);
      return [b.name,b.phone,b.email,b.address,b.source,b.website,iss,
        cs.called?'Da':'',cs.answered?'Da':'',cs.interested?'Da':'']
        .map(v=>'"'+String(v||'').replace(/"/g,'""')+'"').join(',');
    });
    const blob = new Blob([[hdrs.join(','),...rows].join('\n')],{type:'text/csv;charset=utf-8;'});
    const a = Object.assign(document.createElement('a'),{
      href:URL.createObjectURL(blob),
      download:'leads_slovenija_'+new Date().toISOString().slice(0,10)+'.csv',
    });
    a.click();
  }

  const inp = {background:'var(--bg)',color:'var(--text)',border:'1px solid var(--border)',borderRadius:8,padding:'8px 12px',fontSize:'.82rem',outline:'none'};

  return (
    <div style={{minHeight:'100vh'}}>
      <header style={{background:'linear-gradient(135deg,#1a1040,#1e1b4b,#0d1117)',padding:'22px 32px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div>
          <h1 style={{fontSize:'1.5rem',fontWeight:800}}>🇸🇮 Slovenia Lead Dashboard</h1>
          <p style={{color:'#a5b4fc',marginTop:4,fontSize:'.82rem'}}>Analiza spletnih strani · prodajni CRM</p>
        </div>
        <button onClick={()=>{sessionStorage.removeItem('sl_auth');setAuthed(false);}}
          style={{background:'none',border:'1px solid var(--border)',color:'var(--muted)',borderRadius:8,padding:'6px 14px',fontSize:'.78rem',cursor:'pointer'}}>
          Sign out
        </button>
      </header>

      <div style={{display:'flex',gap:10,padding:'14px 32px',flexWrap:'wrap',borderBottom:'1px solid var(--border)',background:'var(--card2)'}}>
        <Stat label="Total" value={total} />
        <Stat label="Audited" value={audited} />
        <Stat label="Has issues" value={hasIssues} color="var(--red)" />
        <Stat label="Called" value={called} color="#6366f1" />
        <Stat label="Answered" value={answered} color="var(--green)" />
        <Stat label="Interested" value={interested} color="var(--amber)" />
        <Stat label="Showing" value={items.length} color="var(--muted)" />
      </div>

      <div style={{display:'flex',gap:10,padding:'12px 32px',flexWrap:'wrap',alignItems:'center',borderBottom:'1px solid var(--border)',background:'var(--card)',position:'sticky',top:0,zIndex:100}}>
        <input style={{...inp,width:220}} placeholder="🔍 Search name, phone, address…" value={search} onChange={e=>setSearch(e.target.value)} />
        <select style={inp} value={issueF} onChange={e=>setIssueF(e.target.value)}>
          <option value="">All issues</option>
          {issueTypes.map(id=><option key={id} value={id}>{ISSUE_META[id]?.label||id}</option>)}
        </select>
        <select style={inp} value={sourceF} onChange={e=>setSourceF(e.target.value)}>
          <option value="">All sources</option>
          {sources.map(s=><option key={s} value={s}>{s}</option>)}
        </select>
        <select style={inp} value={callF} onChange={e=>{setCallF(e.target.value);refresh();}}>
          <option value="">All CRM</option>
          <option value="uncalled">📞 Not called</option>
          <option value="called">📞 Called</option>
          <option value="answered">✅ Answered</option>
          <option value="interested">⭐ Interested</option>
        </select>
        <select style={inp} value={sortBy} onChange={e=>setSortBy(e.target.value)}>
          <option value="score">Most issues first</option>
          <option value="name">Name A–Z</option>
        </select>
        <button onClick={()=>{setSearch('');setIssueF('');setSourceF('');setCallF('');}}
          style={{...inp,cursor:'pointer',color:'var(--muted)',background:'transparent',padding:'8px 10px'}} title="Clear filters">✕</button>
        <button onClick={exportCSV}
          style={{marginLeft:'auto',background:'linear-gradient(135deg,#6366f1,#4f46e5)',color:'white',border:'none',borderRadius:8,padding:'8px 18px',fontSize:'.82rem',fontWeight:700,cursor:'pointer'}}>
          ⬇ CSV
        </button>
      </div>

      <div style={{padding:'24px 32px',display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(380px,1fr))',gap:16}}>
        {items.length===0
          ? <div style={{gridColumn:'1/-1',textAlign:'center',padding:'80px 0',color:'var(--muted)',fontSize:'1.05rem'}}>No results for this filter combination.</div>
          : items.map((b,i)=><BusinessCard key={i} biz={b} onUpdate={refresh}/>)
        }
      </div>
      {items.length>0 && (
        <div style={{textAlign:'center',padding:'16px 0 32px',color:'var(--muted)',fontSize:'.78rem'}}>
          {items.length} of {total} businesses shown
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
